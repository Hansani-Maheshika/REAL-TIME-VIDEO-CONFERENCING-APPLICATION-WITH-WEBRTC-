<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>EasyMeet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="copyModal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <h3>✅ Meeting Created!</h3>
        <p>Share these details with your participants so they can join:</p>
        
        <div class="copy-group">
            <label>Meeting Link:</label>
            <div class="copy-row">
                <input type="text" id="generatedLink" readonly>
                <button id="copyLinkBtn">Copy</button>
            </div>
        </div>

        <div class="copy-group">
            <label>Meeting ID:</label>
            <div class="copy-row">
                <input type="text" id="generatedId" readonly>
                <button id="copyIdBtn">Copy</button>
            </div>
        </div>

        <button id="startMeetingBtn" class="start-btn">Enter Meeting Now</button>
    </div>
</div>

<div id="loginScreen" class="center-screen">
    <div class="login-box">
        <h2>EasyMeet</h2>
        <p class="subtitle">High-quality video conferencing</p>
        
        <div class="input-group">
            <input type="text" id="username" placeholder="Enter Your Name (Required)">
        </div>

        <div class="action-box">
            <h3>Start a New Meeting</h3>
            <p>Generate a unique Meeting ID and link to share</p>
            <button id="createBtn" class="create-btn">Create Meeting</button>
        </div>

        <div class="divider"><span>OR</span></div>

        <div class="action-box">
            <h3>Join an Existing Meeting</h3>
            <p>Enter the Meeting ID provided by the host</p>
            <input type="text" id="roomInput" placeholder="Enter Meeting ID">
            <button id="joinBtn" class="join-btn">Join Meeting</button>
        </div>
    </div>
</div>

<div id="meetingScreen" style="display:none;">

    <div class="top-bar">
        <span>EasyMeet</span>
        <span id="callTimer">00:00</span>
    </div>

    <div class="main-container">

        <div id="videoContainer" class="video-grid">
            <video id="localVideo" autoplay muted playsinline></video>
        </div>

        <div class="chat-panel">
            <h3>Chat</h3>
            <ul id="messages"></ul>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Type message...">
                <button id="sendBtn">Send</button>
            </div>
        </div>

    </div>

    <div class="control-bar">
        <button id="muteBtn">🎤 Mute</button>
        <button id="cameraBtn">📷 Camera Off</button>
        <button id="recordBtn">⏺ Record</button>
        <button id="leaveBtn" class="leave">Leave</button>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
