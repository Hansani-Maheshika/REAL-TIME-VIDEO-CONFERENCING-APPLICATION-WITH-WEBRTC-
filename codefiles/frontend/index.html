<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>EasyMeet - Zoom Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="homeScreen" class="zoom-home">
    <div class="sidebar">
        <div class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">Home</span>
        </div>
        <div class="nav-item">
            <span class="nav-icon">📹</span>
            <span class="nav-text">Meetings</span>
        </div>
        <div class="nav-item">
            <span class="nav-icon">📋</span>
            <span class="nav-text">Surveys</span>
        </div>
        <div class="nav-item">
            <span class="nav-icon">•••</span>
            <span class="nav-text">More</span>
        </div>
    </div>

    <div class="main-content">
        <div class="top-widget-area">
            <div class="button-grid">
                <button id="showNewMeetingModal" class="square-btn orange-btn">
                    <div class="btn-icon">📹</div>
                    New meeting
                </button>
                <button id="showJoinModal" class="square-btn blue-btn">
                    <div class="btn-icon">➕</div>
                    Join
                </button>
                <button class="square-btn default-btn">
                    <div class="btn-icon">📅</div>
                    Schedule
                </button>
                <button class="square-btn default-btn">
                    <div class="btn-icon">⬆️</div>
                    Share screen
                </button>
            </div>

            <div class="datetime-widget">
                <h1 id="clockTime">12:00 PM</h1>
                <p id="clockDate">Monday, January 1, 2026</p>
            </div>
        </div>
    </div>
</div>

<div id="newMeetingModal" class="modal-overlay" style="display:none;">
    <div class="modal-content small-modal">
        <h3>Start New Meeting</h3>
        <input type="text" id="hostName" placeholder="Enter Your Name">
        <div class="modal-actions">
            <button id="cancelNewBtn" class="secondary-btn">Cancel</button>
            <button id="startNewMeetingBtn" class="primary-btn">Start</button>
        </div>
    </div>
</div>

<div id="joinMeetingModal" class="modal-overlay" style="display:none;">
    <div class="modal-content small-modal">
        <h3>Join Meeting</h3>
        <input type="text" id="joinName" placeholder="Enter Your Name">
        <input type="text" id="joinRoomId" placeholder="Meeting ID">
        <div class="modal-actions">
            <button id="cancelJoinBtn" class="secondary-btn">Cancel</button>
            <button id="joinExistingBtn" class="primary-btn">Join</button>
        </div>
    </div>
</div>

<div id="copyModal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <h3>✅ Meeting Created!</h3>
        <p>Share these details with your participants:</p>
        <div class="copy-group">
            <label>Meeting Link:</label>
            <div class="copy-row">
                <input type="text" id="generatedLink" readonly>
                <button id="copyLinkBtn">Copy</button>
            </div>
        </div>
        <div class="copy-group">
            <label>Meeting ID:</label>
            <div class="copy-row">
                <input type="text" id="generatedId" readonly>
                <button id="copyIdBtn">Copy</button>
            </div>
        </div>
        <button id="enterMeetingBtn" class="primary-btn w-100">Enter Meeting</button>
    </div>
</div>

<div id="meetingScreen" style="display:none;">
    
    <div class="meeting-workspace">
        <div id="videoContainer" class="video-grid">
            <video id="localVideo" autoplay muted playsinline></video>
        </div>

        <div id="chatPanel" class="chat-panel hidden">
            <div class="chat-header">
                <h3>Meeting Chat</h3>
                <button id="closeChatBtn" class="close-btn">✖</button>
            </div>
            <ul id="messages"></ul>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Type message here... (Press Enter to send)">
                <button id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <div class="control-bar">
        <div class="controls-left">
            <button id="muteBtn" class="control-btn"><span class="icon">🎤</span><br>Mute</button>
            <button id="cameraBtn" class="control-btn"><span class="icon">📷</span><br>Stop Video</button>
        </div>
        
        <div class="controls-center">
            <button class="control-btn"><span class="icon">👥</span><br>Participants</button>
            <button id="toggleChatBtn" class="control-btn"><span class="icon">💬</span><br>Chat</button>
            
            <div class="reaction-wrapper">
                <div id="reactionMenu" class="reaction-menu hidden">
                    <span class="emoji-btn">👍</span>
                    <span class="emoji-btn">❤️</span>
                    <span class="emoji-btn">😂</span>
                    <span class="emoji-btn">😮</span>
                    <span class="emoji-btn">🎉</span>
                </div>
                <button id="reactBtn" class="control-btn"><span class="icon">😊</span><br>React</button>
            </div>

            <button class="control-btn"><span class="icon">⬆️</span><br>Share</button>
            <button id="recordBtn" class="control-btn"><span class="icon">⏺</span><br>Record</button>
        </div>

        <div class="controls-right">
            <button id="leaveBtn" class="leave-btn">End</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
