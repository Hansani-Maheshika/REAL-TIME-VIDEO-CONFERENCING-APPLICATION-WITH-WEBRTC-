<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyMeet - Real-time Video Conferencing with WebRTC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginScreen">
        <header>
            <h1>EasyMeet</h1>
        </header>
        <div class="card-container">
            <div class="card" id="createCard">
                <h2>Create Meeting</h2>
                <div class="form-group">
                    <label for="userNameCreate">User name</label>
                    <input type="text" id="userNameCreate" placeholder="Enter your name">
                </div>
                <button id="createMeetingBtn" class="btn primary-btn">Create Meeting <i class="icon-arrow-right">-></i></button>
                
                <div id="shareInfo" class="share-info hidden">
                    <h3>Now you can copy share link and ID to share</h3>
                    <div class="share-item">
                        <label>Meeting Link:</label>
                        <span id="meetingLink"></span>
                        <i class="icon-copy" id="copyLinkIcon" title="Copy Meeting Link">
                            <svg viewBox="0 0 24 24"><path d="M19 21H8V7h11m0-2H8a2 2 0 00-2 2v14a2 2 0 002 2h11a2 2 0 002-2V7a2 2 0 00-2-2m-3-4H4a2 2 0 00-2 2v14h2V3h10V1z"></path></svg>
                        </i>
                    </div>
                    <div class="share-item">
                        <label>Meeting ID:</label>
                        <span id="meetingId"></span>
                        <i class="icon-copy" id="copyIdIcon" title="Copy Meeting ID">
                            <svg viewBox="0 0 24 24"><path d="M19 21H8V7h11m0-2H8a2 2 0 00-2 2v14a2 2 0 002 2h11a2 2 0 002-2V7a2 2 0 00-2-2m-3-4H4a2 2 0 00-2 2v14h2V3h10V1z"></path></svg>
                        </i>
                    </div>
                    <p>Now you can copy share link and ID to share. Other one can join with share link and enter room ID and his name to join particular meeting.</p>
                </div>
            </div>

            <div class="card" id="joinCard">
                <h2>Join Meeting</h2>
                <div class="form-group">
                    <label for="meetingIdJoin">Meeting ID</label>
                    <input type="text" id="meetingIdJoin" placeholder="Enter meeting ID">
                </div>
                <div class="form-group">
                    <label for="userNameJoin">User name</label>
                    <input type="text" id="userNameJoin" placeholder="Enter your name">
                </div>
                <button id="joinMeetingBtn" class="btn primary-btn">Join Meeting <i class="icon-arrow-right">-></i></button>
            </div>
        </div>
    </div>

    <div id="meetingScreen" style="display:none;">
        <div class="meeting-header">
            <div class="controls-left">
                <button id="muteBtn" class="control-btn" title="Toggle Microphone">🎤</button>
                <button id="cameraBtn" class="control-btn" title="Toggle Camera">📹</button>
            </div>
            <div id="callTimer" class="timer">00:00</div>
            <div class="controls-right">
                <div class="reaction-wrapper">
                    <div id="reactionMenu" class="reaction-menu hidden">
                        <button class="emoji-btn">👍</button>
                        <button class="emoji-btn">❤️</button>
                        <button class="emoji-btn">😂</button>
                        <button class="emoji-btn">😮</button>
                        <button class="emoji-btn">🎉</button>
                    </div>
                    <button id="reactBtn" class="control-btn" title="Send Reaction">😊</button>
                </div>
                <button id="recordBtn" class="control-btn" title="Start Recording">🔴 Record</button>
                <button id="toggleChatBtn" class="control-btn" title="Toggle Chat">
                    💬 Chat <span id="chatNotificationBadge" class="notification-badge hidden"></span>
                </button>
                <button id="leaveBtn" class="control-btn leave-btn" title="Leave Meeting">Close Meeting</button>
            </div>
        </div>
        <div class="meeting-content">
            <div id="videoContainer" class="video-grid">
                <video id="localVideo" autoplay muted playsinline></video>
            </div>
            <div id="chatPanel" class="chat-panel hidden">
                <div class="chat-header">
                    <h3>Chat</h3>
                    <button id="closeChatBtn" class="close-panel-btn">✕</button>
                </div>
                <ul id="messages" class="message-list"></ul>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Type a message...">
                    <button id="sendBtn" class="btn send-btn">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
